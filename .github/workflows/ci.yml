name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ai_workspace
          POSTGRES_USER: ai_user
          POSTGRES_PASSWORD: ai_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test Backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: ai_workspace
          DB_USER: ai_user
          DB_PASSWORD: ai_password
          JWT_SECRET: dGVzdF9zZWNyZXRfa2V5X2Zvcl9qd3Rfc2lnbmluZ19tdXN0X2JlX2F0X2xlYXN0XzMyX2J5dGVzX2xvbmc=
        run: |
          cd backend
          mvn clean test

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend
        run: |
          cd frontend
          npm run build
