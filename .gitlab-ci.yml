stages:
  - test

backend-test:
  stage: test
  image: maven:3.9.6-eclipse-temurin-21
  services:
    - name: postgres:16
      alias: postgres
  variables:
    # PostgreSQL Service variables
    POSTGRES_DB: ai_workspace
    POSTGRES_USER: ai_user
    POSTGRES_PASSWORD: ai_password
    # Spring Boot Application variables
    DB_HOST: postgres
    DB_PORT: 5432
    DB_NAME: ai_workspace
    DB_USER: ai_user
    DB_PASSWORD: ai_password
    JWT_SECRET: dGVzdF9zZWNyZXRfa2V5X2Zvcl9qd3Rfc2lnbmluZ19tdXN0X2JlX2F0X2xlYXN0XzMyX2J5dGVzX2xvbmc=
  cache:
    key: maven-cache
    paths:
      - .m2/repository
  script:
    - cd backend
    - mvn clean test -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository

frontend-test:
  stage: test
  image: node:20
  cache:
    key: node-cache
    paths:
      - frontend/node_modules/
  script:
    - cd frontend
    - npm ci
    - npm run build
