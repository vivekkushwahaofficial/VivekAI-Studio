version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_workspace_db
    environment:
      POSTGRES_USER: ${DB_USER:-ai_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ai_password}
      POSTGRES_DB: ${DB_NAME:-ai_workspace}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ai_user} -d ${DB_NAME:-ai_workspace}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_workspace_backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${DB_NAME:-ai_workspace}
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-ai_user}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-ai_password}
      - VIVEKAI_JWT_SECRET=${VIVEKAI_JWT_SECRET}
      - VIVEKAI_COOKIE_SECURE=${VIVEKAI_COOKIE_SECURE:-true}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - ai_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_workspace_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ai_network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: ai_workspace_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@workspace.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin_password}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - ai_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  ai_network:
    driver: bridge
