version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_workspace_db
    environment:
      POSTGRES_USER: ${DB_USER:-ai_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ai_password}
      POSTGRES_DB: ${DB_NAME:-ai_workspace}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai_network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: ai_workspace_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@workspace.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin_password}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - ai_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  ai_network:
    driver: bridge
