# ===============================
# Config Import (Loads .env natively)
# ===============================
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties],optional:file:backend/.env[.properties]

# ===============================
# Server
# ===============================
server.port=8080
server.servlet.context-path=/api

# ===============================
# Spring Application
# ===============================
spring.application.name=vivekai-studio

# ===============================
# Database
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ai_workspace}
spring.datasource.username=${DB_USER:ai_user}
spring.datasource.password=${DB_PASSWORD:ai_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# Flyway
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# ===============================
# JWT Security (Java Code Mappings)
# ===============================
vivekai.jwt.secret=${JWT_SECRET}
vivekai.jwt.expirationMs=${JWT_EXPIRATION_MS:86400000}
vivekai.jwt.refreshExpirationMs=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Standard mappings (compatibility)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ===============================
# Cookies Settings
# ===============================
vivekai.cookie.secure=${COOKIE_SECURE:false}

# ===============================
# Spring Boot Actuator & Observability
# ===============================
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.metrics.export.prometheus.enabled=true
